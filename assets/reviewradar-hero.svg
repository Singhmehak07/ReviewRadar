<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">ReviewRadar</title>
  <desc id="desc">An animated radar visualization for an explainable machine-learning review credibility analyzer.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08101f"/>
      <stop offset="0.55" stop-color="#101b33"/>
      <stop offset="1" stop-color="#0b2431"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#d8eaff"/>
      <stop offset="1" stop-color="#86d8cf"/>
    </linearGradient>
    <linearGradient id="sweepGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5e9fe8" stop-opacity="0"/>
      <stop offset="1" stop-color="#70d9c7" stop-opacity="0.72"/>
    </linearGradient>
    <radialGradient id="radarGlow">
      <stop offset="0" stop-color="#2783de" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#2783de" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#2783de" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="largeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="radarClip">
      <circle cx="244" cy="220" r="145"/>
    </clipPath>
    <pattern id="microGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8fb6dc" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .sweep { transform-origin: 244px 220px; animation: radar-spin 5.5s linear infinite; }
    .orbit { stroke-dasharray: 10 12; animation: orbit-flow 7s linear infinite; }
    .blip-a { animation: blip 2.8s ease-in-out infinite; }
    .blip-b { animation: blip 2.8s ease-in-out .9s infinite; }
    .blip-c { animation: blip 2.8s ease-in-out 1.7s infinite; }
    .signal { animation: signal-flow 4.5s linear infinite; }
    .status-dot { animation: status-pulse 2.2s ease-in-out infinite; }
    .float-card { animation: float-card 5s ease-in-out infinite; }

    @keyframes radar-spin { to { transform: rotate(360deg); } }
    @keyframes orbit-flow { to { stroke-dashoffset: -44; } }
    @keyframes signal-flow { to { stroke-dashoffset: -72; } }
    @keyframes blip {
      0%, 100% { opacity: .45; transform: scale(.82); }
      48% { opacity: 1; transform: scale(1.18); }
    }
    @keyframes status-pulse {
      0%, 100% { opacity: .55; }
      50% { opacity: 1; }
    }
    @keyframes float-card {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .sweep, .orbit, .blip-a, .blip-b, .blip-c, .signal, .status-dot, .float-card { animation: none !important; }
    }
  </style>

  <rect width="1200" height="440" rx="28" fill="url(#background)"/>
  <rect width="1200" height="440" rx="28" fill="url(#microGrid)"/>
  <path d="M0 344 C240 294 377 406 620 350 C827 302 996 280 1200 330 L1200 440 L0 440 Z" fill="#2783de" opacity="0.035"/>
  <circle cx="1040" cy="58" r="180" fill="#36bca5" opacity="0.05" filter="url(#largeGlow)"/>
  <circle cx="244" cy="220" r="192" fill="url(#radarGlow)"/>

  <!-- Radar -->
  <g aria-hidden="true">
    <circle cx="244" cy="220" r="145" fill="#0b1c32" fill-opacity="0.56" stroke="#7db6ed" stroke-opacity="0.26" stroke-width="1.4"/>
    <circle cx="244" cy="220" r="108" fill="none" stroke="#7db6ed" stroke-opacity="0.19"/>
    <circle cx="244" cy="220" r="72" fill="none" stroke="#7db6ed" stroke-opacity="0.19"/>
    <circle cx="244" cy="220" r="36" fill="none" stroke="#7db6ed" stroke-opacity="0.19"/>
    <circle class="orbit" cx="244" cy="220" r="127" fill="none" stroke="#70d9c7" stroke-opacity="0.24" stroke-width="1.5"/>
    <path d="M99 220 H389 M244 75 V365" stroke="#7db6ed" stroke-opacity="0.15"/>
    <path d="M141.5 117.5 L346.5 322.5 M346.5 117.5 L141.5 322.5" stroke="#7db6ed" stroke-opacity="0.08"/>

    <g class="sweep" clip-path="url(#radarClip)">
      <path d="M244 220 L244 66 A154 154 0 0 1 387 164 Z" fill="url(#sweepGradient)" opacity="0.6"/>
      <line x1="244" y1="220" x2="244" y2="72" stroke="#8ce8d7" stroke-width="2" stroke-linecap="round" filter="url(#softGlow)"/>
    </g>

    <g class="blip-a" style="transform-origin: 313px 146px">
      <circle cx="313" cy="146" r="10" fill="#5e9fe8" opacity="0.14" filter="url(#softGlow)"/>
      <circle cx="313" cy="146" r="4" fill="#89c6ff"/>
    </g>
    <g class="blip-b" style="transform-origin: 182px 268px">
      <circle cx="182" cy="268" r="10" fill="#70d9c7" opacity="0.14" filter="url(#softGlow)"/>
      <circle cx="182" cy="268" r="4" fill="#70d9c7"/>
    </g>
    <g class="blip-c" style="transform-origin: 310px 278px">
      <circle cx="310" cy="278" r="9" fill="#eac26b" opacity="0.12" filter="url(#softGlow)"/>
      <circle cx="310" cy="278" r="3.5" fill="#eac26b"/>
    </g>

    <circle cx="244" cy="220" r="7" fill="#d8f5ef" filter="url(#softGlow)"/>
    <circle cx="244" cy="220" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Divider signal -->
  <path class="signal" d="M411 110 V330" fill="none" stroke="#5e9fe8" stroke-opacity="0.34" stroke-width="2" stroke-dasharray="2 10"/>

  <!-- Content -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <g transform="translate(462 96)">
      <rect width="176" height="30" rx="8" fill="#5e9fe8" fill-opacity="0.12" stroke="#5e9fe8" stroke-opacity="0.22"/>
      <circle class="status-dot" cx="17" cy="15" r="4" fill="#70d9c7"/>
      <text x="30" y="20" fill="#a9cdef" font-size="13" font-weight="650" letter-spacing="1.2">EXPLAINABLE ML</text>
    </g>

    <text x="460" y="194" fill="url(#titleGradient)" font-size="64" font-weight="760" letter-spacing="-2.4">ReviewRadar</text>
    <text x="463" y="234" fill="#a9b8cd" font-size="20" font-weight="450">Review credibility signals—without the black box.</text>

    <g transform="translate(462 272)">
      <g class="float-card">
        <rect width="178" height="58" rx="11" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.12"/>
        <path d="M18 34 L28 24 L38 29 L50 16" fill="none" stroke="#70d9c7" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="64" y="25" fill="#f3f7fc" font-size="14" font-weight="650">Risk bands</text>
        <text x="64" y="43" fill="#8fa2ba" font-size="12">Low · Moderate · High</text>
      </g>

      <g transform="translate(194 0)">
        <g class="float-card" style="animation-delay:.6s">
          <rect width="184" height="58" rx="11" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.12"/>
          <path d="M18 18 H47 M18 27 H41 M18 36 H50" stroke="#72b4f2" stroke-width="2.2" stroke-linecap="round"/>
          <text x="64" y="25" fill="#f3f7fc" font-size="14" font-weight="650">Phrase evidence</text>
          <text x="64" y="43" fill="#8fa2ba" font-size="12">TF-IDF contributions</text>
        </g>
      </g>

      <g transform="translate(394 0)">
        <g class="float-card" style="animation-delay:1.2s">
          <rect width="184" height="58" rx="11" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.12"/>
          <circle cx="29" cy="29" r="13" fill="#5e9fe8" fill-opacity="0.12" stroke="#5e9fe8" stroke-opacity="0.7"/>
          <path d="M24 29 L28 33 L35 24" fill="none" stroke="#8ce8d7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="54" y="25" fill="#f3f7fc" font-size="14" font-weight="650">Responsible output</text>
          <text x="54" y="43" fill="#8fa2ba" font-size="12">Signals, not verdicts</text>
        </g>
      </g>
    </g>

    <text x="463" y="373" fill="#71849c" font-size="13" letter-spacing="0.5">FASTAPI  ·  SCIKIT-LEARN  ·  VADER  ·  PYTHON</text>
  </g>

  <rect x="0.75" y="0.75" width="1198.5" height="438.5" rx="27.25" fill="none" stroke="#ffffff" stroke-opacity="0.11" stroke-width="1.5"/>
</svg>
