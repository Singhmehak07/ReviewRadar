services:
  - type: web
    name: review-credibility-analyzer
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      playwright install --with-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: ALLOWED_ORIGINS
        value: "*"
